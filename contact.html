<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retale Kabongo | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-white text-gray-900">

  <!-- HEADER -->
  <header class="w-full py-8 px-8 md:px-16 lg:px-24">
    <div class="max-w-7xl mx-auto flex justify-between items-start">
      <!-- Logo / Nom -->
      <div class="flex flex-col">
        <a href="index.html" class="text-xl font-bold leading-tight tracking-tighter uppercase">
          Retale<br>Kabongo
        </a>
      </div>

      <!-- Navigation -->
      <nav>
        <ul class="flex items-center space-x-6 text-sm font-medium">
          <li>
            <a href="cv.html" class="hover:opacity-60 transition-opacity">CV</a>
          </li>
          <li class="text-gray-400 font-light">|</li>
          <li>
            <a href="projets.html" class="hover:opacity-60 transition-opacity">Projets</a>
          </li>
          <li class="text-gray-400 font-light">|</li>
          <li>
            <a href="contact.html" class="hover:opacity-60 transition-opacity">Contact</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- SECTION CONTACT -->
  <main class="max-w-6xl mx-auto px-6 py-20">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-20">

      <!-- Colonne Gauche : Infos -->
      <div>
        <h1 class="text-3xl font-bold mb-10">Contact</h1>

        <div class="mb-8">
          <h3 class="font-bold text-lg">Phone</h3>
          <p class="text-gray-700">+243840485397</p>
        </div>

        <div>
          <h3 class="font-bold text-lg">Email</h3>
          <p class="text-gray-700">retalekabs@gmail.com</p>
        </div>
      </div>

      <!-- Colonne Droite : Formulaire -->
      <form action="#" method="POST" class="space-y-6">
        <!-- Prénom et Nom -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Prénom</label>
            <input type="text" class="w-full border border-black p-2 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm mb-1">Nom</label>
            <input type="text" class="w-full border border-black p-2 focus:outline-none">
          </div>
        </div>

        <!-- E-mail et Sujet -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">E-mail</label>
            <input type="email" class="w-full border border-black p-2 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm mb-1">Sujet</label>
            <input type="text" class="w-full border border-black p-2 focus:outline-none">
          </div>
        </div>

        <!-- Message -->
        <div>
          <label class="block text-sm mb-1">Message</label>
          <textarea rows="6" class="w-full border border-black p-2 focus:outline-none"></textarea>
        </div>

        <!-- Bouton Envoyer -->
        <div class="flex justify-end">
          <button type="submit" class="bg-[#eac545] hover:bg-yellow-500 text-black font-medium py-3 px-10 rounded-xl transition">
            Envoyer
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-gray-300 py-12 mt-10">
    <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-8">
      <!-- Téléphone -->
      <div>
        <h3 class="font-bold text-gray-900 mb-2">Téléphone</h3>
        <p class="text-sm text-gray-700">+243840485397</p>
      </div>

      <!-- Email -->
      <div>
        <h3 class="font-bold text-gray-900 mb-2">Email</h3>
        <p class="text-sm text-gray-700">retalekabs@gmail.com</p>
      </div>

      <!-- Suivez-moi -->
      <div>
        <h3 class="font-bold text-gray-900 mb-2">Suivez-moi</h3>
        <div class="flex gap-4">
          <!-- WhatsApp -->
          <a href="https://wa.me/+243840485397" target="_blank" class="hover:opacity-75 transition-opacity">
            <img src="images/icones/whatsapp.svg" alt="WhatsApp" class="w-6 h-6">
          </a>
          <!-- Instagram -->
          <a href="https://instagram.com/etoilefilante_sisbusiness" target="_blank" class="hover:opacity-75 transition-opacity">
            <img src="images/icones/instagram.svg" alt="Instagram" class="w-6 h-6">
          </a>
        </div>
      </div>

      <!-- Copyright -->
      <div class="md:text-right">
        <p class="text-sm text-gray-700">© 2026 By Retalekabs</p>
      </div>
    </div>
  </footer>

</body>
</html>
